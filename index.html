<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Viewer</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #D8D8D8;
    }
    .page {
      display: none;
      height: 100vh;
      width: 100vw;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .active {
      display: flex;
    }
    .image-buttons {
    display: flex;
    gap: 60px;
    justify-content: center;
    align-items: center;
    }

    .image-button {
    width: 312px;
    height: 372px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid rgb(216, 216, 216);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    }

    .image-button:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 12px #D8D8D8;
    }
    button {
      margin-top: 20px;
      padding: 20px 40px;
      border-radius: 20px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      }
    
    iframe {
      width: 1280px;
      height: 720px;
      border: none;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>

  <!-- Page 1: 首頁 -->
  <div id="page1" class="page active">
    <div class="image-buttons">
      <img src="image/car.png" alt="Car" class="image-button" onclick="goToPage(2)">
      <img src="image/house.png" alt="House" class="image-button" onclick="goToPage(3)">
      <img src="image/bag.png" alt="Bag" class="image-button" onclick="goToPage(4)">
    </div>
  </div>

  <!-- Page 2: 車子 -->
  <div id="page2" class="page">
    <iframe src='https://my.spline.design/untitled-M1OzlOoI1lmwsspUwUKjtoin/' frameborder='0' width='100%' height='100%'></iframe>
    <button onclick="goToPage(1)">Back</button>
    
  </div>

  <!-- Page 3: 房子 -->
  <div id="page3" class="page">
    <iframe src='https://my.spline.design/untitled-HMIYR9Uue2FT8M9oidHqcAIt/' frameborder='0' width='100%' height='100%'></iframe>
    <button onclick="goToPage(1)">Back</button>
  </div>

  <!-- Page 4: 包包 -->
  <div id="page4" class="page">
    <iframe src='https://my.spline.design/untitled-Wx7Hl64PoACwgYCdGjZnY1OC/' frameborder='0' width='100%' height='100%'></iframe>
    <button onclick="goToPage(1)">Back</button>
  </div>

  <script>
    function goToPage(pageNumber) {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      document.getElementById('page' + pageNumber).classList.add('active');
    }
  </script>
</body>
</html>
